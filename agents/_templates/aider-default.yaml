# Template: Aider agent (Docker deployment)
# Copy to agents/<host>/<name>.yaml and fill in the metadata fields.

apiVersion: myrmidons/v1
kind: Agent
metadata:
  name: CHANGE_ME
  host: hermes
spec:
  label: CHANGE_ME
  program: aider
  model: null
  workingDirectory: /home/mvillmow/CHANGE_ME
  programArgs: "--yes --model claude-3-5-sonnet-20241022"
  taskDescription: "Describe what this agent does"
  tags: []
  owner: mvillmow
  role: member
  deployment:
    type: docker           # "local" = tmux on host; "docker" = container
    # docker block required when type: docker.
    # Image must be built from AchaeanFleet repo before deploying.
    docker:
      image: achaean-aider:latest  # Image from AchaeanFleet repo
      cpus: 1
      memory: 2g
  desiredState: active
